<!doctype html><html lang='mn'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cache Reset v40</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#160105;color:#ffe67d;font-family:Arial,sans-serif;text-align:center}div{max-width:520px;padding:24px}b{font-size:28px}</style></head><body><div><b>v40 шинэчилж байна...</b><p>Хуучин cache цэвэрлээд шинэ тайлангийн хувилбар нээнэ.</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}}catch(e){}try{if('caches'in window){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}}catch(e){}setTimeout(()=>{location.replace('./index.html?v=40&fresh='+Date.now())},700)})();</script></body></html>
